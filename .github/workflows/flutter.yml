name: Flutter Build

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  build:

    runs-on: ubuntu-latest


    defaults:
      run:
        working-directory: fresh_app


    steps:


    - name: Checkout

      uses: actions/checkout@v4



    - name: Setup Flutter

      uses: subosito/flutter-action@v2

      with:

        channel: stable



    - name: Get packages

      run: flutter pub get



    - name: Analyze

      run: flutter analyze



    - name: Build APK

      run: flutter build apk --release



    - name: Upload APK

      uses: actions/upload-artifact@v4

      with:

        name: flutter-apk

        path: fresh_app/build/app/outputs/flutter-apk/app-release.apk
